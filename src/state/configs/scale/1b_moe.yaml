# SE 1B MoE — ~1B total, ~300M active per token
# 16 routed experts, top-2, MoE every other layer
# d_model=1024, d_hid=2048, 12 layers
model:
  emsize: 1024
  d_hid: 2048
  output_dim: 1024
  nlayers: 12
  nhead: 16
  n_latent: 256
  n_cross_attn_rounds: 1
  batch_size: 128
  gradient_checkpointing: false
  moe:
    enable: true
    num_experts: 16
    top_k: 2
    moe_freq: 2
    load_balance_weight: 0.01
    router_z_weight: 0.001
    expert_parallel: false
    num_shared_experts: 0
