# SE 7B MoE — ~7.4B total, ~1.7B active per token
# 16 experts, top-2, MoE every 2nd layer
# d_model=2048 matches dense 600m attention, d_hid=6144 gives 7.4B total
model:
  emsize: 2048
  d_hid: 6144
  output_dim: 2048
  nlayers: 32
  nhead: 32
  n_latent: 512
  n_cross_attn_rounds: 2
  batch_size: 8
  gradient_checkpointing: false
  moe:
    enable: true
    num_experts: 16
    top_k: 2
    moe_freq: 2
    load_balance_weight: 0.01
    router_z_weight: 0.001
