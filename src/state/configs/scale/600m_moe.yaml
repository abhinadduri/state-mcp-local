# SE 600M-active MoE — ~2.2B total, ~600M active per token
# 8 experts, top-2, MoE every 2nd layer
model:
  emsize: 2048
  d_hid: 4096
  output_dim: 2048
  nlayers: 16
  nhead: 16
  n_latent: 256
  n_cross_attn_rounds: 1
  batch_size: 64
  gradient_checkpointing: false
  moe:
    enable: true
    num_experts: 8
    top_k: 2
    moe_freq: 2
    load_balance_weight: 0.01
    router_z_weight: 0.001
